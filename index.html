<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <!-- Fonte Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">
    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Scripts -->
    <script src="js/app.js" defer></script>
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header id="qr-header">
            <h1>Gerador de QR code</h1>
            <p>Insira uma URL ou texto, para criar um QR Code</p>
        </header>


        <!-- Text submission and QR code generation -->
        <div id="qr-form">
            <input type="text" placeholder="Digite a URL ou texto...">
            <button>Gerar QR Code</button>
            <button id="cleanText">Limpar Texto</button>
        </div>


        <!-- QR Code generated -->
        <div id="qr-code">
            <img src="img/qrcode.png" alt=" QR Code">
        </div>

    </div>

</body>

</html>
